#进行docker-compose配置,格式为version:3.8或更高版本,
# services: 每个服务都有一个容器,容器之间通过网络通信,版本只能为3.8或更高版本，
#为什么从3.8开始支持services:格式
services:
  mysql:
    image: mysql:8.0
    container_name: flashsale-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql123456
      MYSQL_DATABASE: flashsale
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flashsale-network

  redis:
    image: redis:7.0
    container_name: flashsale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flashsale-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: flashsale-kafka
    environment:
      # KRaft模式配置
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      # KRaft集群ID（使用UUID生成）
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
    # 配置Kafka日志目录
      - kafka_data:/tmp/kafka-logs
    networks:
      - flashsale-network

  app:
    build: .
    container_name: flashsale-app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
      - kafka
    environment:
      - DATABASE_URL=mysql+mysqlconnector://flashsale:flashsale123@mysql:3306/flashsale
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - flashsale-network

volumes:
  mysql_data:
  kafka_data:
  redis_data:

networks:
  flashsale-network:
    driver: bridge
