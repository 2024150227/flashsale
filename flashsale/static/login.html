<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashSale - 用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 60px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #f093fb;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 0.95rem;
            display: none;
        }

        .status-message.success {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
            display: block;
        }

        .status-message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .mode-switch {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mode-switch a {
            color: #f093fb;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .mode-switch a:hover {
            color: #f5576c;
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .feature-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature-item {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .feature-item span {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }

        .feature-item label {
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>⚡ FlashSale</h1>
            <p>高并发秒杀系统</p>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername">👤 用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required minlength="3" maxlength="50">
            </div>

            <div class="form-group">
                <label for="loginPassword">🔒 密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required minlength="6" maxlength="100">
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span id="loginBtnText">登录系统</span>
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label for="regUsername">👤 用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名（3-50位）" required minlength="3" maxlength="50">
            </div>

            <div class="form-group">
                <label for="regPassword">🔒 密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required minlength="6"
                    maxlength="100">
            </div>

            <div class="form-group">
                <label for="regName">📛 姓名</label>
                <input type="text" id="regName" placeholder="请输入您的姓名" required maxlength="100">
            </div>

            <div class="form-group">
                <label for="regAge">🎂 年龄</label>
                <input type="number" id="regAge" placeholder="请输入年龄" required min="1" max="120" value="20">
            </div>

            <button type="submit" class="btn btn-primary" id="registerBtn">
                <span id="registerBtnText">注册账号</span>
            </button>
        </form>

        <div class="mode-switch">
            <span id="switchText">还没有账号？<a id="switchLink">立即注册</a></span>
        </div>

        <div class="feature-list">
            <div class="feature-item">
                <span>🔐</span>
                <label>安全认证</label>
            </div>
            <div class="feature-item">
                <span>⚡</span>
                <label>极速秒杀</label>
            </div>
            <div class="feature-item">
                <span>❤️</span>
                <label>收藏管理</label>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let isLoginMode = true;

        // 页面加载时检查token
        document.addEventListener('DOMContentLoaded', function () {
            const token = localStorage.getItem('access_token');
            if (token) {
                checkTokenValidity(token);
            }
        });

        // 切换登录/注册模式
        document.getElementById('switchLink').addEventListener('click', function () {
            isLoginMode = !isLoginMode;
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const switchText = document.getElementById('switchText');
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.className = 'status-message';

            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                switchText.innerHTML = '还没有账号？<a id="switchLink">立即注册</a>';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                switchText.innerHTML = '已有账号？<a id="switchLink">立即登录</a></a>';
            }

            // 重新绑定切换事件
            document.getElementById('switchLink').addEventListener('click', arguments.callee);
        });

        // 检查token有效性
        async function checkTokenValidity(token) {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    window.location.href = '/flashsale';
                } else {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user_info');
                }
            } catch (error) {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_info');
            }
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const statusMessage = document.getElementById('statusMessage');

            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<span class="loading"></span>登录中...';
            statusMessage.className = 'status-message';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));

                    statusMessage.className = 'status-message success';
                    statusMessage.textContent = '✅ 登录成功，正在跳转...';

                    setTimeout(() => {
                        window.location.href = '/flashsale';
                    }, 1500);
                } else {
                    statusMessage.className = 'status-message error';
                    statusMessage.textContent = '❌ ' + (data.detail || '登录失败');
                }
            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = '❌ 网络错误，请检查服务器是否运行';
            } finally {
                loginBtn.disabled = false;
                loginBtnText.textContent = '登录系统';
            }
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;
            const age = parseInt(document.getElementById('regAge').value);
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnText = document.getElementById('registerBtnText');
            const statusMessage = document.getElementById('statusMessage');

            registerBtn.disabled = true;
            registerBtnText.innerHTML = '<span class="loading"></span>注册中...';
            statusMessage.className = 'status-message';

            try {
                // 先注册
                const registerResponse = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name, age })
                });

                const registerData = await registerResponse.json();

                if (!registerResponse.ok) {
                    statusMessage.className = 'status-message error';
                    statusMessage.textContent = '❌ ' + (registerData.detail || '注册失败');
                    registerBtn.disabled = false;
                    registerBtnText.textContent = '注册账号';
                    return;
                }

                // 注册成功后自动登录
                statusMessage.className = 'status-message success';
                statusMessage.textContent = '✅ 注册成功，正在登录...';

                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const loginData = await loginResponse.json();

                if (loginResponse.ok) {
                    localStorage.setItem('access_token', loginData.access_token);
                    localStorage.setItem('user_info', JSON.stringify(loginData.user));

                    setTimeout(() => {
                        window.location.href = '/flashsale';
                    }, 1500);
                } else {
                    statusMessage.className = 'status-message error';
                    statusMessage.textContent = '❌ 注册成功，但登录失败，请手动登录';
                    registerBtn.disabled = false;
                    registerBtnText.textContent = '注册账号';
                }
            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = '❌ 网络错误，请检查服务器是否运行';
                registerBtn.disabled = false;
                registerBtnText.textContent = '注册账号';
            }
        });
    </script>
</body>

</html>
