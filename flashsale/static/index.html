<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashSale - 秒杀系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* User Info Bar */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .user-details {
            color: white;
        }

        .user-details .username {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .user-details .user-id {
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .logout-btn {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: #e74c3c;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(231, 76, 60, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        /* Status Bar */
        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar.success {
            background: rgba(39, 174, 96, 0.2);
        }

        .status-bar.error {
            background: rgba(231, 76, 60, 0.2);
        }

        /* Countdown Timer */
        .countdown {
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.2) 0%, rgba(245, 87, 108, 0.2) 100%);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(240, 147, 251, 0.3);
        }

        .countdown-title {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .timer-block {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 12px;
            min-width: 80px;
        }

        .timer-block span {
            display: block;
            color: #f093fb;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .timer-block label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Product Card */
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.2);
            border-color: rgba(240, 147, 251, 0.4);
        }

        /* Product Image */
        .product-image {
            height: 220px;
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.3) 0%, rgba(245, 87, 108, 0.3) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        /* Product Info */
        .product-info {
            padding: 25px;
        }

        .product-id {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .product-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin-bottom: 15px;
            height: 40px;
            overflow: hidden;
        }

        .product-price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 15px;
        }

        .product-price {
            color: #f5576c;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .product-original-price {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: line-through;
            font-size: 1rem;
        }

        .product-stock {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .product-stock .stock-icon {
            font-size: 1.2rem;
        }

        .product-stock .stock-value {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .product-stock.low .stock-value {
            color: #f39c12;
        }

        .product-stock.empty .stock-value {
            color: #e74c3c;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none;
        }

        /* Order Form */
        .order-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-form h2 {
            color: white;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #f093fb;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.3);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 20px 30px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #f093fb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Product Icons */
        .product-icon-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .product-icon-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .product-icon-3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .product-icon-4 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .product-icon-5 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .product-icon-6 {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .product-icon-7 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .product-icon-8 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        /* Footer */
        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>⚡ FlashSale 秒杀系统</h1>
            <p>精选好物，限时抢购，错过再等一年！</p>
        </header>

        <div class="user-bar" id="userBar" style="display: none;">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <div class="username" id="username">用户名</div>
                    <div class="user-id">ID: <span id="userIdDisplay">0</span></div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn" onclick="handleLogout()">退出登录</button>
        </div>

        <div class="status-bar" id="statusBar">
            <span id="statusText">正在连接服务器...</span>
        </div>

        <div class="countdown">
            <div class="countdown-title">🔥 距离本场秒杀结束还有</div>
            <div class="countdown-timer">
                <div class="timer-block"><span id="hours">00</span><label>时</label></div>
                <div class="timer-block"><span id="minutes">00</span><label>分</label></div>
                <div class="timer-block"><span id="seconds">00</span><label>秒</label></div>
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="loading">加载商品中</div>
        </div>

        <div class="order-form">
            <h2>🎯 快速秒杀</h2>
            <form id="orderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="userId">👤 用户ID</label>
                        <input type="number" id="userId" placeholder="请输入您的用户ID" required>
                    </div>
                    <div class="form-group">
                        <label for="productId">📦 商品ID</label>
                        <input type="number" id="productId" placeholder="输入要秒杀的商品ID" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">立即秒杀 ⚡</button>
            </form>
        </div>

        <footer>
            <p>© 2026 FlashSale 秒杀系统 | 专注高并发秒杀服务</p>
        </footer>
    </div>

    <script>
        const API_BASE = '/api/v1';
        const MAX_PRODUCTS = 20;

        // 商品图标库
        const productIcons = ['📱', '💻', '🎧', '🎮', '⌚', '🎵', '📷', '🎁', '💡', '🎨', '🚀', '🌟', '💎', '🎯', '⚽', '🏀', '🎸', '📚', '🍎', '🎪'];
        const gradientClasses = ['product-icon-1', 'product-icon-2', 'product-icon-3', 'product-icon-4', 'product-icon-5', 'product-icon-6', 'product-icon-7', 'product-icon-8'];

        // 倒计时功能
        function startCountdown() {
            const endTime = new Date();
            endTime.setHours(endTime.getHours() + 2); // 2小时后结束

            setInterval(() => {
                const now = new Date();
                const diff = endTime - now;

                if (diff <= 0) {
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }, 1000);
        }

        async function checkServerStatus() {
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');

            try {
                const response = await fetch(`${API_BASE}/products/`);
                if (response.ok) {
                    statusBar.className = 'status-bar success';
                    statusText.innerHTML = '✅ 服务器连接正常 | <span style="opacity:0.7">API 服务运行中</span>';
                } else {
                    statusBar.className = 'status-bar error';
                    statusText.textContent = '❌ 服务器响应异常';
                }
            } catch (error) {
                statusBar.className = 'status-bar error';
                statusText.textContent = '❌ 无法连接服务器';
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="loading">加载商品中</div>';

            try {
                const response = await fetch(`${API_BASE}/products/`);
                if (!response.ok) throw new Error('HTTP error');

                const products = await response.json();

                // 只取前20个商品
                const displayProducts = products.slice(0, MAX_PRODUCTS);

                if (displayProducts.length === 0) {
                    grid.innerHTML = '<div class="loading">暂无秒杀商品</div>';
                    return;
                }

                grid.innerHTML = displayProducts.map((product, index) => {
                    const icon = productIcons[index % productIcons.length];
                    const gradientClass = gradientClasses[index % gradientClasses.length];
                    const stockClass = product.stock <= 0 ? 'empty' : product.stock <= 10 ? 'low' : '';
                    const originalPrice = (product.price * 1.5).toFixed(2);

                    return `
                        <div class="product-card" data-product-id="${product.id}">
                            <div class="product-image ${gradientClass}">
                                ${icon}
                            </div>
                            <div class="product-info">
                                <div class="product-id">商品 ID: ${product.id}</div>
                                <div class="product-name">${product.name}</div>
                                <div class="product-description">${product.description || '限时特惠，数量有限'}</div>
                                <div class="product-price-row">
                                    <div class="product-price">¥${product.price.toFixed(2)}</div>
                                    <div class="product-original-price">¥${originalPrice}</div>
                                </div>
                                <div class="product-stock ${stockClass}">
                                    <span class="stock-icon">📦</span>
                                    <span>剩余库存:</span>
                                    <span class="stock-value">${product.stock}</span>
                                </div>
                                <button class="btn btn-primary" ${product.stock <= 0 ? 'disabled' : ''} 
                                        onclick="quickOrder(${product.id})">
                                    ${product.stock <= 0 ? '已抢光' : '立即抢购'}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                grid.innerHTML = '<div class="loading">加载失败，请检查服务</div>';
                console.error('Load products error:', error);
            }
        }

        async function createOrder(userId, productId) {
            try {
                const response = await fetch(`${API_BASE}/orders/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, product_id: productId })
                });

                const data = await response.json();
                if (response.ok) {
                    showToast('🎉 秒杀成功！订单已进入处理队列', 'success');
                    loadProducts();
                } else {
                    showToast('❌ 秒杀失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('❌ 秒杀失败，请重试', 'error');
            }
        }

        function quickOrder(productId) {
            const userId = prompt('请输入用户ID:', '1');
            if (userId && !isNaN(userId)) {
                createOrder(parseInt(userId), productId);
            }
        }

        document.getElementById('orderForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const productId = document.getElementById('productId').value;
            createOrder(parseInt(userId), parseInt(productId));
        });

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function loadUserInfo() {
            const userInfo = localStorage.getItem('user_info');
            if (userInfo) {
                try {
                    const user = JSON.parse(userInfo);
                    document.getElementById('username').textContent = user.name || user.username;
                    document.getElementById('userIdDisplay').textContent = user.id;
                    document.getElementById('userBar').style.display = 'flex';
                } catch (e) {
                    console.error('加载用户信息失败:', e);
                }
            }
        }

        async function handleLogout() {
            if (!confirm('确定要退出登录吗？')) {
                return;
            }

            try {
                const token = localStorage.getItem('access_token');
                if (token) {
                    const response = await fetch(`${API_BASE}/auth/logout`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (!response.ok) {
                        console.warn('登出请求返回非200状态:', response.status);
                    }
                }
            } catch (error) {
                console.warn('登出请求失败，继续清除本地存储:', error);
            } finally {
                // 无论请求成功与否，都清除本地存储
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_info');

                showToast('👋 已成功退出登录', 'success');

                setTimeout(() => {
                    window.location.href = '/login';
                    window.location.replace('/login');
                }, 1500);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            startCountdown();
            checkServerStatus();
            loadProducts();
            loadUserInfo();

            // 定期刷新状态
            setInterval(checkServerStatus, 30000);
        });
    </script>
</body>

</html>
